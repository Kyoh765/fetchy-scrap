<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1533a8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.9)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>

  <!-- Subtle baseline -->
  <line x1="4" y1="25.5" x2="28" y2="25.5" stroke="white" stroke-width="0.8" opacity="0.18"/>

  <!-- Trending line (ascending, left to right) -->
  <polyline
    points="4,25 9,20 13.5,22 18,14 23,8"
    stroke="url(#line)"
    stroke-width="2.2"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Vertical bar at peak (viral spike) -->
  <line x1="23" y1="25.5" x2="23" y2="8" stroke="white" stroke-width="1" opacity="0.14"/>

  <!-- Glow ring around peak -->
  <circle cx="23" cy="8" r="5" fill="rgba(255,255,255,0.12)"/>

  <!-- Peak dot — the viral moment -->
  <circle cx="23" cy="8" r="3" fill="white"/>
  <circle cx="23" cy="8" r="1.5" fill="#3b82f6"/>
</svg>
